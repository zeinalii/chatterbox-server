[chatterbox]
# Output path. Supported suffixes: .wav, .mp3
out = audio.wav

# Device: auto, cpu, cuda, or mps
device = auto

# Long text is split at sentence boundaries before synthesis.
chunk_chars = 260
pause_seconds = 0.35

# Optional deterministic seed. Leave blank for random generation.
seed =

# Optional 5+ second reference voice clip for voice cloning.
audio_prompt_path =

# Chatterbox Turbo generation parameters.
repetition_penalty = 1.2
min_p = 0.0
top_p = 0.95
exaggeration = 0.0
cfg_weight = 0.0
temperature = 0.8
top_k = 1000
norm_loudness = true

overwrite = true
quiet = false
